body:
  text: 胡嘉祥法師導義之要二諦義二智義般若義真應義涅槃義佛性義二河義二種次第義正像義金剛三昧義生法二空義涅槃義真應二身義常無常二鳥義半滿義佛性義第一明二諦義攝山師云二諦者乃是表中道之妙教窮文言之極說也道明有無有無不乖其道理雖絶要二因二以得理是以開真俗門說二諦法以化衆生是故經云善男子隨順衆生說於二諦隨凡說名俗諦隨聖說空為其諦問理既非二說二云何得理答說二住二便不得理如聞有住有聞無住無此則名失不得理也若聞二不住二因二悟不二如聞有不住有因有悟不有聞無不住無因無悟不無便為得理問若聞二住二名之為失聞二悟不二稱之為得此之得失為共為一教各各稟不同答此教實無二但行有得之失故兩名不同是以經云若服甘露便得長年若不巧服反成促壽問有為俗諦空為真諦唯有一判更有餘釋答攝嶺山相承略明三種二諦一者單明二諦但空有為俗諦有空為真諦二者復明二諦空有有空應稱為俗諦非空非有乃名真諦三者重復明二諦空有為二非空非有名為不二二與不二應為俗諦非二非不二方是真諦問但得有為俗諦空為真諦亦得空為俗諦有為真諦不答在義亦通但用處為異若是大品所明有為俗諦空為真諦若涅槃所明空為俗諦有為真諦所以然者大品多破有病故以有為世諦歎畢竟空日為真諦若是涅槃破著空空病故以空為俗諦歎涅槃妙有故以有為真諦是以經云空者二十五有不空者謂大涅槃問前云為凡說有為聖說空亦得為聖說有為凡說空不答亦得如故釋論解往生品云聖人知有是假名問諸佛善巧何故不直說非有非無而令衆生因於有無方悟非有非無答要須因指方乃識月不因指無由得月要因有無悟非有非無若不因有無不得悟非有非無也故有無之教表非有非無之理非有非無之理應有無之教故華嚴云一切有無法了達非有無則其證也玄通論云真諦以本無受稱俗諦以假有得名假有表非有名為有除其斷非謂是有也本無表非無名為無除聖常非謂是無也是為有不畢有言無不畢無二言未始一所表未始殊問為破有無明非有非無為不破有無明非有非無答具有二義若執顛倒定性有無即與破有而明非有破無明非無若因緣假名義即識因緣有非有因緣無非無故不破也問今釋二諦與他非是此方外何異答今教解種種不同略出二家一者不空假名二諦二者空假名二諦所言不空者衆緣生法無有自性故為空以無性空偏目真諦衆緣假法不可令空故為世諦第二解云明衆緣生法即是世諦衆緣舉體不可得目為真諦故舊云不空之義為鼠嘍栗後家為安瓜義也此之二說意各不然經云色即是空空即是色汝云何言假是不空經又云不壞假名而說實相汝云何言色舉體空無故有色問今時亦得有此不答隨緣方便亦有此義如一往為論衆緣假有此即為俗無有自往此即為真二往為言雖無有自性而有衆緣猶是俗諦體以衆緣皆不可得名為真諦漸捨為言故宜有二意是以有無喻若苽浮問何名為俗諦第一義諦答由來唯有一種今無依得義有多途略而為言凡有三種一依名釋二橫論三竪釋依名釋者世別不同第一義是莫二種云問世俗與第一真為同為異答具有同異言其異者雲瓔法師云世是縱論俗是橫論經云凡夫生生世世往來五道書云三十年為一世故是縱也俗是橫者毗尼云國土風俗不同故俗是橫也真與第一言其異者真是對僞當體受稱第一形二稱歎為目所言同者雖有世之與俗猶為有諦第一與真猶為空諦此即是依名釋義也所言橫釋義者真以俗為義俗以真為義空以色為義色以空為義是以經云欲令衆生深識第一義諦故說世諦欲令深識世諦故說第一義諦即是其證也所言竪釋義者真以不真為義俗以不俗為義經云一切有無法了達非有無即其證也問諦是何義答諦以審實為義問真諦可是審實俗是浮虗云何名實答他釋云俗諦審實浮虗今謂此乃審實何謂審二明二義故論其實一者於實二者教實教實者佛說有無二言必能表道必能應物故名為實也於實者有於凡是實無於聖是實故名為實也問今明二諦與他此有何異答他明二諦是二理二境今明二諦即是教門是故論云諸佛常依二諦為衆生說法大品經云菩薩住二諦中為衆生說法衆生雖蒙二諦教門發智即二諦教轉名為境問他云世諦有言說第一義無言說不可以世諦言說目真諦真諦實無言說今說云何答備有四句俱說俱不說一說一不說俱說者世諦說生滅生滅之言即是世諦第一義說不生滅不生滅之教即第一義所言俱不說者二諦雖說實無所說名俱不說一說一不說者世諦雖說說無所說真諦雖不說不說能說故一說一不說也問云何是二諦體答有二釋一云二諦各體即龍光所用謂有無性異豈得同體第二解云二諦一體就一體中更有兩釋一云二諦同以有為體以析有得空故以有為體也二云二諦同以真為體空為諸法本故今明二諦以中道為體以說於二諦為表不二不二即是中道問二諦云何相即耶答佛為凡聖兩緣故說二諦有為俗故有名言空名真諦故言語路絶衆生便謂空有定異為此緣故云即空是有即有為空也問二諦攝法盡不答開善所明攝法即盡莊嚴所明常住佛果及虗空出二諦外故不盡也今明經具二義即應破並須臾之二智義二智者一是權智二是實智權是善巧之名實是實諦為因斯乃般若妙用利物明術其猶二鳥無相捨離俱凡夫滯有𨷂彼鑒虗小智沉空罔知權用是故菩薩方便具二智也如來以二智察緣即知病識藥說於二諦即應病授藥以智諦故如得而說諦故如說如說定得得行我所說如得而說說我所得故二智即能說二諦即是所說云云前須識有得無得二種二諦然後方識發生二智有得二諦初章前節不能發生二智無得二諦者初章後節故能發生二智經云欲令衆生深識第一義故說世諦欲令衆生識世諦故說第一俗是真俗俗表不俗真是俗真真表不真既悟真俗表非真俗即發二智真俗之教即轉名境教生智能所照境能所云云今明蒙教門悟轉為境離境無智離智無境境智因緣豈是前後及與一時異故因緣境智即是非境非智非能非所是故論云因緣所生法即是寂滅相境能生智此是因緣生智能照境此是因緣照因緣照無所照因緣生無所生故此生此照即是無生無照此境此智即是無境無智無境而說境指智以為境無智而說智指境以為智豈同他性境故智耶應判二智云何明得五時教分二智也第一時前說有相教照十六諦理名為實智照事中色心名為權智第二時無相教即大品之流照空以為實智照有以為權智第三時抑揚教即淨名等抑挫聲聞高揚菩薩照二諦理為實智現反動等為權智第四時會三歸一教即法華之流照三乘為權智照一乘為實智第五時常住教照無常為權智照常住為實智今謂五時教無有經文故不依也他明涅槃中云五味相生即是其證也今明不爾經云從牛出乳出酪酪生蘇生蘇出熟蘇熟蘇出醍醐合譬云從佛出十二部經乃至後方等經出大涅槃若爾從牛出乳乳既言是義從佛出十二部經亦是義耶又般若是第二時未是滿字者此事不然既未是滿字亦應未是大乘若已是大乘應已是滿字又難若言淨名抑小揚大是亦不然彼經呵十聲聞斥四菩薩此乃大小俱彈何得偏判又淨名既毀聲聞猶如燋種言是抑者般若亦可噵其猶如癡犬豈非挫耶若言法華會三歸一般若等經亦得會宗之義故總束方以為一大乘豈非會耶若言般若第二法華第四此事不然大論解畢定品云善吉已聞法華中記聲聞作佛事復聞此經明菩薩有退是故今問佛為畢定為不畢定若觀此意即法華在前般若在後故不可定判也隨緣方便必有深致亦可有無量時何止為五問今判云何答此無定也一往為論照有為方便照空為實智二往為論照空有應為方便照非空非有是實也他照真之慧不能照俗俗之智不能照真照真之慧不能照俗故慧無方便縛照之慧不能照真故是無方便慧今明以實為方便方便為實實方便只是實方便既照俗豈不能照真以方便為實此實只是方便實通照真寧不照俗故兩慧無礙但互舉一邊故方便照俗實即照真也問方便與權實若為其異答通而為論猶是眼目之異名若就別門方便義長權義即短以外國云漚和俱舍羅此言善巧方便故諸佛出世所作施為無非方便若是權慧即短以權是暫於方便中更抽權用故或復手接大千身入淫舍並是權也以方便義長故屬在般若等教權義既短義即是淨名等經也問他明三乘是方便一乘是實與今何異答此是一句義耳自有二一俱實二俱權一俱實者昔說三權昔為實今說一權今為實昔說三望今一三既是權今說一望昔非今是權也二慧二智通猶是一物即不同一者慧即解智其義猶劣故在因門智名決斷其義即勝故在果地故大品明菩薩有道慧道種慧佛有一切種智也慧名照空智名照有故淨名經云智一切相門起於慧業智種相門起於智業也智於總相名道慧智於別相名道種慧也一切智一切種智例此可知也道種慧云云氷山瑤師解云宗彭城憑法師解云云今謂不得定如此何者菩薩發心其知別總即具二慧道種慧有高下者佛一切智一切種智復可不也前云三是方便一亦是方便在此何處明勝鬘云一乘大方便即其證也般若義問云何為般若答依釋論凡有八解今略解述六家第一解云般若但是真無漏慧位在何處答大乘為論初地以上即是真無漏慧三十心名相似小乘為論從苦忍以上名真無漏自爾之前名為有漏第二般若但是有漏慧以菩薩除煩惱得般若故知是有漏也第三云有漏無漏二種智慧皆是般若所以是有菩薩從發心至坐道場皆是般若故智通也第四云般若非有漏非無漏非有為非無為不可言說離諸戲論龍樹菩薩出世評兩解云有人言前之四說皆有道理皆出佛口隨衆生故作種種說有人言最後解者是以過語言道離諸戲論依無所得是真般若也問六解中今用何解耶答若隨緣方便並皆有此義如其為執悉非般若秦言智慧故可翻實相宗重智慧輕薄故不可以智慧稱量般若不可翻大論云般若有二種一者有為般若有生有滅故是無常二者無為般若無有生滅是故有常實相般若者道超四句理絶百非大論云般若般若波羅蜜實行不顛倒念慧想觀已除言語法亦滅此方便般若者有生有滅有智有愚般若無智無行不知以般若無智即是愚方便此無所不知即是智方便文字般若者即佛說波若說名字及小經卷也實相般若既非愚智所以為體方便般若者有愚智即是用也實相般若為當體受名為從境受稱具有此義自有智實境故名為實相亦當般若體即是實相也般若未曾因果一往為論宜名為因釋論云般若不屬般若二乘但屬菩薩故智慧因也若至果即反名薩般若薩般若悉為一切智亦得為果如涅槃三德中般若涅槃既是果三德般若豈非果耶問涅槃經云般若者一切衆生毗婆舍那一切聖心闍那者諸佛菩薩是事云何答此無淺深中作淺深般若宜翻為慧其義劣毗婆舍那翻之為智其義小勝故是一切聖闍那此翻為見其義最勝故在諸佛菩薩般若波羅蜜者道安法師翻為度無強大智論云彼堓到也然常有二說般若從有相此堓至無相彼堓若是涅槃從生死此堓至涅槃彼堓今說如此釋度非究竟也若然彼此乖勉方是究竟度義真應義經云佛真法身猶如虗空應物現形如水中月論云佛有二種法身一父母生身二法性生身所以有此二身者肇師云非本無以垂迹非迹無以顯本他明常住此是法身昔辨無常此是應身亦得昔為法身今是應身若由來所釋五時不同若初故佛壽八十年以相好為佛第二時佛壽亦八十年以智慧為佛第三時佛壽七百阿僧祇第四時佛壽復倍上數第五時即是常住有四時明佛並是迹身第五常住方是本今明五時不立云云般若經云欲得壽命無量光明無盡當學般若何時定言佛壽八十年云云始迹終本者明王宮不生而生故是始迹終本吾今此身即是法身常樂我淨無有變易故是終本也始本終迹者我從無量劫來久已成佛法身非雜食身即始本也後云今入涅槃示同毒樹即終迹也始終俱迹者明王宮方便現生雙林方便示滅此生滅應皆是迹也始終俱本者王宮現生生而不起是故不生雙林示滅無所失是故不生不滅故始終俱本生滅為迹無生滅為本然生滅由無生滅故有即是非迹無以顯本然由生滅故有無生滅即非無生滅由無生滅故有生滅即非生滅是故非生滅非無生滅由無生滅故有生滅即非生滅是故非生滅非無生滅故云本迹雖殊不思議一也有人云舍那釋迦猶是一佛故華嚴經名號品云或名盧舍那或名釋迦文故知是一佛也地論師解云佛有三身一者應身即是釋迦二者報身即是舍那以修十地因滿感得此謂報佛三者即梨耶真如法本性清淨故名法佛也今所明者並不同此二說然此二佛自有同義自有異義同者如去或名舍那或名釋迦也異者梵網經云我今盧舍那方坐蓮華臺周匝千華上示現千釋迦故執同有失異對有忌同云云問云何為失答舍那是華臺佛故是本釋迦是千葉上尊故是迹也既言釋迦舍那並是迹故不得為本迹也今分於本迹故舍那為本釋迦為迹也問諸佛為同作一佛為各各作佛答三釋云在因異故得果亦異如張王二人云云次在因雖異得果便同如小流大海云云三云亦同亦異世諦即異真諦即同華嚴云十方諸如來同共一法身一心一智慧力無畏亦然一法身何得言異十方諸佛何得言同十方而一何妨言同一而十方何妨言異問法身為有色為無色答如此亦得問法界名與法性身云何同異答他釋法性名即是真諦身法界身即是世諦名也今明且出睿法師解如來之身名種種或法性身或實相名或感重法身或虗空法身言其生即本之法性故得法性言其妙即無相無為謂實相法名言其大彌淪大虗空法身明其用即無感不形謂應法身今法界法性亦復如是取廣大故云法界法身言其體性無有生滅故云法性云身問他云應身說法身不說今釋云何答修通四句問此出何處答釋論云法身佛滿虗空所有音聲說法亦滿虗空即有證也涅槃義所言者外國名摩訶般涅槃那摩訶者或摩醯大論三解釋一者大二者勝三者多正翻為大餘二兼釋也所言大者名字功德品云名之為常二者四相品所言大者其性廣博就此二義為簡昔也昔曰有餘智體猶是無常為簡昔有餘無常故云常也廣博者簡昔無餘昔無餘是無所苞也今明涅槃廣博方有所苞問對小明大為絶待稱大答具有二義一者對小故名大小即無常不苞大即是常是苞二者絶待明大非大非小歎美名大如不因小空名為大空涅槃亦爾不因小涅槃名為大涅槃所言涅槃者自古至今凡三釋一云涅槃無翻二云有翻三云但有義訓故不可得翻一者名含衆義故不可翻彼義序云涅槃者蓋是神道極號八味都名二者含衆義故不可得翻如先陀婆一名四實也三者名含衆義義含衆名名義既圓不可翻也今難若使涅槃此土衆生無由得解而實有緣故可翻次難云云亦名說樂昔亦名說樂既也不可翻亦不可翻今既具萬德昔亦可具德也又難若存外國名不可翻者般若乃至佛陀亦不可翻何故存般若名耶又問般若是圓名此品應圓翻也第二師云涅槃可翻凡有七解一者肇師翻為滅度即開善用也謂大患永滅超度四流四流謂欲流有流見流無明流也又翻涅槃作無為言其虗無寂漠妙絶於有故也亦是肇師云所翻其法師所用第三曇影師云涅槃秦言安樂四者竺道生法師直翻為滅五者靜師翻為寂滅六者宗法師翻為解脫第七梁武翻不生今難若衆涅槃定可翻者在經何故猶在般若睿師大品序云不可翻者即而書云云次難涅槃定可翻者經何故云或言寂滅或稱滅度今的用何物翻耶第三義訓凡有三師遠師稱為實愛公稱祕密藏宗公稱無纍今明義釋猶是無翻不須別難問今云何答前須識涅槃有名無名然後方得辨其翻與不翻若未識其名與無名今云何得論其有翻無翻但他絶義多種不同或言本絶生死遠絶涅槃絶生死又云涅槃即是真諦故以倫絶今時所有諸法清淨假名方便故有所言義無有根本皆是因空而起是以經云空中種樹方覺其巧何者明涅槃無名強為作名此是則無名名亦是強作無名即是名無名名無名故所以不絶而絶以無名名故絶而不絶以名本於無名豈定是無名無名本於名豈定是於名絶本於不絶豈定是不絶不絶本於絶豈定是於絶所以名無名絶不絶非名非無名非絶非不絶故云免其名無名無名豈定是名無名之所能此非名非無名故能名能無名也名無名既然翻亦爾問今釋涅槃以何為義答涅槃即是總別為義也涅槃為總別者具三點四德是故總也若云解脫不生此即為別問涅槃既是總解脫為別亦得解脫不生為總涅槃為別以不答亦有此義若作解脫名說即無非解脫故解脫為總若作不生名則無非不生為總涅槃為別涅槃但對生死而是果果亦得是別問今昔涅槃此有何異耶答昔日涅槃不一時具三德有身智時未必無餘解脫有無餘解脫時無有身智今日涅槃三德一時故有法身即有般若解脫也所以唯明三德者三義故即盡何者無感而不竟故是法身無境而不照故是般若無纍而不盡故即是解脫也舊云法身為體餘二為用今德既圓體用無礙舊一體即是妙有一體即是圓心以為體也問云何是本有涅槃始有涅槃方便淨涅槃性淨涅槃答此間多明本有始有他人明方便淨涅槃性淨涅槃但解本有義不同略出數家第一開善云本有於當常故云本有第二解云本來已有衆德用惑鄣故不得修習第三解云於此無常即有常義說為本有第四云本有而非德道理即是常例如二諦天然任有也始有者佛修因始得故名始有如此等釋並皆須難今所釋者須得本有之言大經云涅槃之體本自有之非適今也是為答德王難本無今有是無常是故為常至論涅槃未曾有無豈是本始何以知之者為破衆生有身有纍是稱破無身無纍以為涅槃衆生便著斷無是故今說有身智方是涅槃此是對治悉檀非第一義諦也羅漢斷煩惱及未來生已盡而餘有身智果在名有餘涅槃也灰身滅智纍果畢竟名無餘也又身在時無為未足即是無為有餘灰身滅智即是無為具足故得無餘也問大乘有有餘以不答有二釋一者大乘直是無餘不說有餘次解云約金剛心以還惑未盡為有餘佛果名無餘問大乘論今釋涅槃與他何異答今明諸法清未曾生死亦未是涅槃但衆生空倒故便成生死諸佛欲度空倒生死若空倒生死息即空涅槃亦淨不如他家生死斷苦涅槃獨存也有餘無餘亦因此為衆生言有煩惱有患息此煩惱故名有餘猶有身智亦名有患身智若盡名曰無餘其論身智本非曾有今何以無對惑情之有明於無也佛性義解正因佛性凡有十家第一解云心為正因故經云凡有心者必得菩提第二云衆生為正因故經云正因謂諸衆生第三云以六法為佛性六法者五陰及衆生故經云不即六法不離六法也第四解云避苦求樂心為佛性第五解云以當果為佛性第六解云以傳不朽為佛性第七解以真神為佛性第八解云以得佛之理為佛性第九解以真如為佛性第十師以梨耶識為佛性也今明如此等釋須皆破之今明者以中道為佛性不同十家也問中道為佛性出何處文答略有四文第一即琉璃珠譬明此寶珠圓而且正喻此中道無餘為佛性故云明與無明愚者謂二智者了達其性無二無二之性即是實性也次師子吼云佛性者名第一義空所言空者不見空與不空即是中道次迦葉白佛言以何為佛性答汝今何故失意作如是問我先不說中道為佛性耶故知中道為佛性也常解云佛性有五一緣因佛性二了因佛性三正因佛性四果佛性五果果佛性緣因佛性言境界能為觀智作緣故名緣因通善惡等法了因者即六度萬行了出佛果唯取善不取餘法言正因法者如前十釋以所因能感佛故名正因也果性者即三菩提名為智德也果果性者即大涅槃名為斷德以因智而得是果中之果今云五性然異常用也今明五性此開為二一者正性即非因非果二者緣性即有因有果是因中更開為二就果中更開兩異因者即十二因緣名之為境因因者即觀照名之為智問經云是因非果名為佛性是果非因名大涅槃亦因亦果即十二因緣所生之法非因非果即是佛性此義云何答是因非果即境界佛性是果非因即大涅槃謂果果性亦因亦果即是觀智諦境界是果望菩提故是因故非因非果即是中道正性亦得通於因果諦觀智即是果諦涅槃斷得即是因問既云正因何者為正果答他云以涅槃為正果今明涅槃是果法非正果也以正性非因非果名帖正性故名正因果名帖正性為正果也二河義二河者凡有五種相對一者緣河對佛性二者生死河對涅槃三者衆生河對佛性河四者善法河對惡法河五者煩惱河智慧河問此五種二河並出何處答經教不同釋迦教其中具有河之與海多借河名舍那教中具有河之與海多借海喻此因取其深廣無邊流注不沈浮等義若是師子吼品明生死河中有七種人欲度生竭死即生死河也迦葉品中有七類人求涅槃即涅槃河又云衆生壽命入如來壽海中即衆生河佛陀海佛也又云雖有龜魚並不離於河大智論云舍利弗不能度布施即河善法又云如來海衆生海佛智慧海即善法惡法等河也問師子吼明七種衆生迦葉品明河中七人云何判一是生死二是涅槃耶答師子吼明七種人同欲度生死有度有不度者欲斷煩惱有斷有不斷者故是生死河迦葉品明七人同欲求涅槃有得有不得同欲見佛有見有不見者故是涅槃河也問此中河義為同異答總而論唯有二河一生死河二涅槃河今一往離之故或十也若是十二因緣河與佛性河此是二用相對若是生死河涅槃河此是得失兩果相對衆生河佛河此得失兩人相對若是善法河惡法河此明乖扶兩法相對煩惱河智慧河此就迷悟解惑相對問二河云何有始終二義答十二因緣河具有始終義無始終義無始終者無明為因老死為果老死復為因無明復為果此則往還無盡牽果不窮即無始終義始終者中論引四百觀論云真法及說者聽者難得故如是即生死非有邊無邊得真法說者聽者以無明為因因更作果以老死為果果更作因此即十二因緣始終即無始終也佛性河亦有始終無始終義無始而始始自發心不終而終終於佛果此即無始終始終義也問云何交終論始終等四句答自有生死之始為涅槃之終涅槃之終為生死之始涅槃之始為生死之終生死之終為涅槃之始所言生死之始涅槃之終者若起一念有無顛倒生死之始便失正道無復涅槃故是涅槃之終為生死之始者即是上句無別意也但明涅槃若其終盡便是生死之始也涅槃之始為生死之終者若一念與般若相應即涅槃之始生死即便盡淨故有生死之終二種次第義釋妙莊嚴等品三世諸佛唯有二種次第一根緣次第二義次第亦云論次第言義次第者如先說苦諦次說集諦也根緣次第者如先說苦諦後說十善等非四諦之次但隨根緣也佛說法具此二種次第而多就根緣次第諸菩薩造論亦具二種次第但弟子欲解佛語多依義門次第撰集佛語次第釋之問二次第何者為正答以根緣次第為正所以然者佛及弟子說經造論唯令人悟而教無有定問叵有定義以不答如前云唯以悟為定故則不定如大經云菩薩餘事諍論得皆是如來隨根緣說以此衆生非一國土一種根性一善智識是故如來不作一說但令取悟耳若爾前說法華壽量後則明諸菩薩又前說陀羅尼呪後說妙莊嚴王本事根緣次第不必辨呪居第一妙莊嚴王為第二故非義次第此通釋二十八品經八萬四千法藏也問直聞妙莊王本事云何悟道耶答佛見根緣說必得道無論事理及以古今設不見機雖說妙道於緣無益問上說妙音來往得悟無生今聞往古事復得淨眼然大小二悟要見空後得道今說有事云何成聖答雖質小疑實壯哉大問成論人云見空得道數人云見有成聖諍論紛然由來久矣今明如數論等四句皆不得道何以故之釋論解般若度中云不得般若方便力故學阿毗曇墮有見中學空門墮空見學有無門墮亦定亦有見中學非有無門隨愚癡論故知四句皆不得道也若得般若方便學此四句不墮四見若爾者善巧學四句皆得道不善巧學四句四句皆不得道又即此明菩薩往來而得道者即是善巧方便學有故得道問云何善巧答菩薩來者此是不來於來雖來不來悟解此來即生二慧是以得道問見有得道為作有解故得道作空解故得道答已前說作有解即有見作空解即空見如是四句皆不得道識有是空有雖有而不有因此得入道有終非道乃是道門耳空等亦然正像義此義總釋諸受記中法住久近問釋迦佛法住世凡得幾年答正法千年像法千年末法萬年出祇桓精舍善見毗婆沙中亦有此說但度女人出家損正法五百年有人言都失五百年正法但五百像法千年故摩耶經但明千五百年中論文亦爾有人言損正法五百流入像法像法便有千五百年有人言修八敬故正法還復千年問何故三時復但言像正答言像正者攝末法入像也言末法者開像為二謂像及末問何以故像即末耶答十二門論云末世衆生薄福鈍根即名像為末也問云何為像正答此具多義一者佛在世為正佛滅度後為像二者未有異部為正有異部為像則百十六年後方樂像法耳三者得道多為正得道少為像故釋迦前五百年得道多不得少後五百年得道少不得者多四者破正法未破正法分像正大經耶正品我滅度後七百年中是魔波旬漸當破壞我之正法則六百年未破為正七百年破為像五者諸惡法起分像正像法決疑經云千一百年諸惡法起名像若千年內惡法未起為正然千年內雖有惡法起起猶未盛故屬正也惡盛為像六者二千年皆屬正法萬年轉衰微為像法七者諸菩薩見如來法無有滅常見諸佛則萬二千乃至一切時皆是正法二乘人見佛法有興衰故有像正耶問何故釋迦正法但得千年耶答過去釋迦佛正法千年住世而釋迦本作陶師因發願願我作佛為釋迦令我正法亦千年住也以是事故正法但千年問佛滅度以來凡得幾年答至今已得一千五百九十六年問經何故云正法千年住世何故千年外別有佛法答此不相違所以然者佛法有二種一正得二正教正得者即得道人也正教者佛正法教也言千年佛法滅者此就正得為言耳千年內有得道人千年外得道人少故名佛法滅也正教法者乃至萬年住世也問佛法滅時有幾因緣答有七因緣如思益經廣說問有三大劫三小劫法華經中身子正法住世三十二小劫像法亦三十二何故但言小劫非大劫耶答應是小劫所以然者大劫則無佛世界豈有佛法住耶而今云三十劫者此是小劫耳問三大劫通淨穢土三小劫但是穢土若爾身子成佛時皆是淨土云何有小劫起耶答外國名劫波此云分別時節今但有時節久近如小劫起有盡之數名小劫耳實無小劫起也問小劫時節云何答從八萬四千歲漸減至十歲名一小劫問一大劫唯有八十小劫耳常不輕品中云彼佛正法住世如四天下微塵劫耶答大劫有長短不同短大劫者但有八十小劫耳長大劫者其事不定如娑婆一劫比四方為一日一夜如是乃有百萬阿僧祇品如華嚴廣說以此推之無所疑也論佛入涅槃釋此經諸佛入滅事諸佛有六事故入涅槃一者為所應成就衆生已竟故入涅槃二者令二乘人捨小涅槃令歸大涅槃故所以然者如來捨此身歸法身者二乘之人亦應捨此身求佛法身也三者為除衆生輕慢心故淺識之流取信耳自謂如來身有生老病死與己身同於如來身起輕劣想是故今明佛有二身一變化身捨之入滅此與人同二者法身無老病死此與人異四者為令衆生生渴仰心若恆見不滅必生厭薄示現捨滅故生渴仰心五有令衆生勤加精進悟世非常諸佛有三種力勝一切衆生一父母生身力勝一切人天二神通力勝一切人三解脫力勝一切人雖有三力為無常所滅故知無常其力最大因此悟世無常勤修道六者為已勤修道者速令成熟是故現滅也金剛三昧義金剛是譬喻亦名三昧直心行處或云調直定或喻喻三昧名金剛三昧或喻心金剛心或喻般若名金剛般若或喻法身名金剛身但金剛是世間之寶體堅用利一切物不能寢體堅也而能權一切物用利也又此寶世間第一此三昧亦爾又此寶世人不能評價三昧亦爾又此寶色是即不定此三昧亦爾或名三昧或名般若照靖為三昧靖照名般若但三昧之智極細之惑此心能斷云金剛三昧也然一往借此為喻而實非喻金剛世間之寶得之即喜失之即憂三昧不爾不喜不憂一得不失又世間金剛即破壞三昧不爾畢竟不壞也生法二空義五陰中求衆生不可得名衆生空求法不可得名為法空亦名衆生忍也得衆生空堪忍無我相故名衆生忍法忍例然大論云行衆生忍生諸福德行諸法忍生諸智慧此義將生法二空竝難之生法二忍既分福慧生法二空亦應然也生法二空既名智慧生法二忍亦應並皆稱德解云此則通例但二空是自行解心故皆是智慧二忍自他兩對生忍忍他法忍自行故濟也涅槃義外國應云摩訶般涅槃那摩訶此翻名大大論具三義大勝多以大為正大有六義一常故大經云所言大者名之為常二者廣故大經云所言大者其性廣博也三者多義故大經云勝如大城多諸珍寶涅槃亦爾多妙法珍寶故名大也四者深義為大淵深難測故名為深經云大名不可思議一切人天二乘所不能測五者高義為大一切聖人所不能甲經云勝如大山一切世人不能得上二乘菩薩不能得上故名為大也六者勝義為大世間中上勝之人名為大人涅槃亦爾諸勝故名為大也又大有二義一體大謂甚深法性二用大應化無方故經云住大涅槃能建大義又有二種大一待大二絶待大一往相待名大再往絶待乃是好大非但無小亦復無大非大非小嘆美為大故經云無苦無樂強名大樂也般者翻入涅槃者翻滅正翻入滅亦云滅度肇師云大患永滅超度四流故稱滅度若翻解脫不生此並義訓非正翻也若翻解脫不生物應不生非物又今悉同名涅槃問名為成也但今昔涅槃異昔日有餘解脫不具無餘復闕身智今日涅槃法解般若三德具足圓備涅槃有德法身般若各有三德如是伊字伊字如今草下字也如自在天面上三目也云有餘無餘者小乘煩惱滅縛盡名有餘身智果纍滅即無餘大乘五住因有名為有餘無常法滅為無餘攝大乘論具四義云今所明者有二煩惱一客二舊生滅為客舊皆盡無餘又云但為解脫觀名有餘解觀但淨名無餘也真應二身義經云佛真法身猶如虗空應物現形如水中月故虗空喻法身以遍無礙義故也水中月喻應身如月升天水皆現諸身照鑒物感便顯形又水濁不見月水清便見月衆生心水不淨不見佛身心若清淨即見如來也又有三佛義地論像法決疑經明三佛謂法報應身如本有為法身佛法身顯酬因義為報佛以應機化物為化佛金光明經三佛謂法應化也法身如前應佛有三義一與理相應故名應佛此猶報佛也然三皆稱佛三皆名覺覺義云何別解法佛如理報佛知行也應佛具知理行故也又云三佛俱知三法既稱佛豈有不知者耶又法報應三佛即合應開真開真為法報二佛也金光明經三佛即合真應真應為應化二佛也然二佛更無別體只真如正法為體真如本有為法佛酬因名報佛化物為化佛又此三佛皆常皆是常者法身本有故常報佛修因顯常應佛常說法化緣故常有時云法報常應佛無常三佛說法有時云法佛說法應佛不說應佛說法報佛不說等耳知又三佛因者有時明因唯二種謂了因生因法佛了因現也報應生因生也又云法佛了因現報因具二因親辨起為生因疏而助為了因如大經云六度為生因佛性為了因應佛無別因既顯時法報自然應物又云大悲誓願是應身因只大悲誓願般若身了因能了法身也常無常二鳥義故經云云何共聖行如娑羅鳥迦鄰提日月大伯與歲星但二鳥有前後飛義前說苦無常後說常樂我也二鳥有並飛義明涅槃之法非常非無常常無常也又說涅槃能建大義具常無常二種方便名為竝飛二鳥有上下飛即常無常勝劣義我今為汝說勝三修法苦無常無我三法為前為下常樂我為勝為上此即三修六修義昔日名三修今昔合明之六修也半滿義經云云何解滿字及以半字義還成常無常義耳一者無常為半字常為滿字何爾昔日為破外道橫計生死中有常樂我淨故說苦無我破外道邪見為起小乘名為半字明常之病既消無常之患廢又經文云其後不久須得病須用常樂為發菩提故名滿字若今昔治病並得名滿字今昔相望昔小今大昔半今滿也但行始之徒不知說此常樂為息無常之病而復但為至極故次明常無常並為息俱非究竟悉名半字也非常非無常不二乃名滿字也為破二病故明不二為滿此未具足亦未是滿前明常無常二皆是用滿次明非常非無常不二皆是體滿又若單明體亦非好滿若能非常非無常常無常具足二鳥雙遊體用具足乃名滿字也佛性義夫如如至道非迷非悟蕩蕩玄津無縛無解特由虗妄衆生撫執成惑金揚錭葉刀似蓮華乳色不分象形莫了隨其流處六味不同競捉瓦礫謂為真寶故種智靈覺世雄調御示金錍之旨眼瘼即除處良醫之方眉珠便顯言佛性者以覺了名佛不改名性十方諸佛以此為性故言佛性也佛性有五種他釋不同開善云一正因二緣因三了因四果五果果正因者心也凡有心者皆當作佛故心為正因緣因者即十二因緣了因即所生智慧了出菩提也果性即菩提果果即大涅槃也莊嚴云衆生為正性經云正因者謂諸衆生緣因謂六波羅蜜餘同開善也山門明中道為佛性大經云何故失意我先不言中道為佛性耶又云第一義空名為佛性第一義即中道也更無有多但有時為衆生故開之為二謂正性與緣性緣性名傍性就緣性中復開因果因中二因因與因因果中亦二果與果果因中有境智境為因智為因因果智菩提智為果涅槃為果果故今五性一因二因因三果四果果五正性非因非果也但經文有兩四句初四句云因與因因果與果果此並緣緣性十二因緣名因所生智是因因故是因因從因故所以名因因菩提是果涅槃是果果者涅槃是果德果故果果也後四句謂是因非果是果非因是因果非因非果他云此四句但明三性今明此四句具足明緣正五性是因非果即十二緣境性也是果非因即涅槃果果性也是因是果具於二性觀智與菩提此二同是果智性又是因是果觀智是境果果是菩提因因菩提由觀智果是涅槃因故是因是果具二性也非因非果名佛性即正性但正性非因因名帖強名正性非果果名帖強名正果若爾此有三足前四句便成七種解云不然正性雖三名只是一法若作正性名即沒正因正果名若作正因名即沒正性正果名故唯是一法足前四句五句問正性帖緣性亦帖不解云正性非因非果故帖名因果緣性是因是果更令帖作何物又並正性帖緣性不帖正性中緣性非中皆中皆帖經云十二因緣不生不滅非因非果既雙非何故不名帖解云即通例今明義涅槃十二緣非因非果非生死因果如是佛性因義正性非因非果即非佛性因果故不例也復有四句佛性善根人有闡提人有善根人無二人俱有二人俱無釋者不同一云善根人有有觀智性闡提人無此也闡提人有有即境界性善根人無無惡境界性二人俱有有正因性正因是心故二人俱無無果性也山門釋佛性非善非惡善惡方便及理內外義理內闡提有佛性理外善根無佛性也理內善根有理外闡提無也二人俱有並是理內二人俱無並是理外也人有五性凡夫如雜血乳須斯二理如純乳那含如酪羅漢如生蘇辟支如熟蘇佛如醍醐復有七種六種五種佛性如迦葉品三十二廣釋也三論略章造道藏為七世父母現在父母及一切六道四生衆生卍云此書恐人所摘録而所抄出者則係嘉祥大師製作故姑收藏爾云
